<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code — Vanamaali Spices</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      border: 1px solid #ebebeb;
      max-width: 320px;
      width: 100%;
    }

    .logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 8px;
      display: block;
    }

    .label {
      text-align: center;
    }

    .label h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.2px;
    }

    .label p {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 4px;
    }

    .url {
      font-size: 0.72rem;
      color: #d98e0f;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .btn-download {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 24px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .btn-download:hover { background: #2a2a2a; }

    @media print {
      body { background: white; }
      .card { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="Vanamaali Spices" />
    <div id="qrcode"></div>
    <div class="label">
      <h2>Vanamaali Spices</h2>
      <p>Scan to view digital business card</p>
    </div>
    <span class="url">card.vanamaalispices.in</span>
    <button class="btn-download" onclick="downloadQR()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M12 5v14m-7-7 7 7 7-7"/><path d="M5 20h14"/>
      </svg>
      Download PNG
    </button>
  </div>

  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://card.vanamaalispices.in',
      width: 200,
      height: 200,
      colorDark: '#111111',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    function downloadQR() {
      const scale = 3;
      const cardW = 320, cardH = 480;
      const W = cardW * scale, H = cardH * scale;

      const out = document.createElement('canvas');
      out.width = W; out.height = H;
      const ctx = out.getContext('2d');

      // background + rounded rect
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      const r = 20 * scale;
      ctx.moveTo(r, 0); ctx.lineTo(W - r, 0);
      ctx.quadraticCurveTo(W, 0, W, r);
      ctx.lineTo(W, H - r);
      ctx.quadraticCurveTo(W, H, W - r, H);
      ctx.lineTo(r, H); ctx.quadraticCurveTo(0, H, 0, H - r);
      ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath(); ctx.fill();

      // logo
      const logo = document.querySelector('.logo');
      const logoSize = 48 * scale;
      const logoX = (W - logoSize) / 2;
      ctx.drawImage(logo, logoX, 40 * scale, logoSize, logoSize);

      // qr code
      const qrCanvas = document.querySelector('#qrcode canvas');
      const qrSize = 200 * scale;
      const qrX = (W - qrSize) / 2;
      ctx.drawImage(qrCanvas, qrX, 120 * scale, qrSize, qrSize);

      // title
      ctx.fillStyle = '#111111';
      ctx.font = `bold ${16 * scale}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('Vanamaali Spices', W / 2, 352 * scale);

      // subtitle
      ctx.fillStyle = '#9ca3af';
      ctx.font = `${11 * scale}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.fillText('Scan to view digital business card', W / 2, 372 * scale);

      // url
      ctx.fillStyle = '#d98e0f';
      ctx.font = `500 ${10 * scale}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.fillText('card.vanamaalispices.in', W / 2, 400 * scale);

      const a = document.createElement('a');
      a.href = out.toDataURL('image/png');
      a.download = 'vanamaali-qr.png';
      a.click();
    }
  </script>
</body>
</html>
