<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code — Vanamaali Spices</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      border: 1px solid #ebebeb;
      max-width: 320px;
      width: 100%;
    }

    .logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 8px;
      display: block;
    }

    .label {
      text-align: center;
    }

    .label h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.2px;
    }

    .label p {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 4px;
    }

    .url {
      font-size: 0.72rem;
      color: #d98e0f;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    @media print {
      body { background: white; }
      .card { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="Vanamaali Spices" />
    <div id="qrcode"></div>
    <div class="label">
      <h2>Vanamaali Spices</h2>
      <p>Scan to view digital business card</p>
    </div>
    <span class="url">card.vanamaalispices.in</span>
  </div>

  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://card.vanamaalispices.in',
      width: 200,
      height: 200,
      colorDark: '#111111',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
